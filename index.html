<!DOCTYPE html>
<html lang="ja">
<head>
  <!-- 文字コード・ビューポート（最優先） -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Tag Manager (実際のIDに書き換える) -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);})(window,document,'script','dataLayer','GTM-XXXXXXX');</script>
  <!-- End Google Tag Manager -->

  <!-- タイトル・基本メタ -->
  <title>タイトル</title>
  <meta name="description" content="このページの説明">

  <!-- 従来のメタデータ（システム・SNS用） -->
  <meta name="author" content="あなたの名前や会社名">
  <!-- 開発者向けクレジット（遊び心・文化） -->
  <link rel="author" href="/humans.txt">
  <!-- SEO向けにはJSON-LDを別途記述 -->

  <!-- Canonical（URL正規化） -->
  <link rel="canonical" href="this-page-url">

  <!-- クローラー制御（Google Discoverの大画像表示を許可） -->
  <meta name="robots" content="max-image-preview:large">
  
  <!-- 1. レガシーブラウザ向け（保険）。Chromeの誤読み込みを防ぐ sizes="any" を付与 -->
  <link rel="icon" href="/favicon.ico" sizes="any">
  <!-- 2. モダンブラウザ向け（主役） -->
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <!-- 3. SVG非対応ブラウザ・Chromeショートカット向け -->
  <link rel="icon" href="/icon-192.png" type="image/png" sizes="192x192">
  <!-- 4. Appleデバイスのホーム画面向け -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#003299">
  
  <!-- OGP (Facebook, X, LINE 等 共通設定) -->
  <meta property="og:locale" content="ja_JP">
  <meta property="og:site_name" content="Tsugawa.TV">
  <meta property="og:type" content="website">
  <meta property="og:title" content="タイトル">
  <meta property="og:description" content="60～70文字程度">
  <meta property="og:url" content="https://tsugawa.tv/example/">
  <meta property="og:image" content="https://tsugawa.tv/images/image-ogp.jpg">
  
  <!-- 画像の補足情報（アクセシビリティ＆初回シェア時のバグ防止） -->
  <meta property="og:image:alt" content="画像の説明">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  
  <!-- X / Twitter Cards (OGPで代用できない固有設定のみ記述) -->
  <meta name="twitter:card" content="summary_large_image">
  <!-- アカウントがあれば以下を追加。無ければ不要 -->
  <!-- <meta name="twitter:site" content="@tsugawa_tv"> -->
  
  <!-- CSS・Google Fonts -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.gstatic.com"><link href="#" rel="stylesheet">
</head>
<body class="home">

  <!-- GTM Body (実際のIDに書き換える) -->
  <!-- Google Tag Manager (noscript) -->
  <!-- <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-XXXXXXX" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript> -->
  <!-- End Google Tag Manager (noscript) -->
  
  <nav>
    <div class="logo">Logo</div>
      <div class="links">
        <a href="#">Link 1</a>
        <a href="#">Link 2</a>
        <a href="#">Link 3</a>
      </div>
  </nav>
  
  <main>
    <p>Hello, World!</p>
  </main>
  
  <footer>
    <p>&copy; 2007 &ndash; <span id="year"></span> Tsugawa.TV</p>
  </footer>
  
  <script>
    document.getElementById("year").innerHTML = new Date().getFullYear();
  </script>

</body>
</html>
