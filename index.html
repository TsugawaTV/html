<!DOCTYPE html>
<html lang="ja">
<head>
  <!-- 文字コード・ビューポート（最優先） -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Tag Manager (実際のIDに書き換える) -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);})(window,document,'script','dataLayer','GTM-XXXXXXX');</script>
  <!-- End Google Tag Manager -->

  <!-- タイトル・基本メタ -->
  <title>タイトル</title>
  <meta name="description" content="このページの説明">

  <!-- DNS/接続の事前確立 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Google Fonts CSS（preconnectの直後に置く） -->
  <link href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&display=swap" rel="stylesheet">

  <!-- ローカル/インライン CSS -->
  <link rel="stylesheet" href="/css/style.css" type="text/css" media="screen">
  <style></style>

  <!-- 従来のメタデータ（システム・SNS用） -->
  <meta name="author" content="あなたの名前や会社名">
  <!-- 開発者向けクレジット（遊び心・文化） -->
  <link rel="author" href="/humans.txt">

  <!-- Canonical（URL正規化） -->
  <link rel="canonical" href="this-page-url">

  <!-- クローラー制御（Google Discoverの大画像表示を許可） -->
  <meta name="robots" content="max-image-preview:large">
  
  <!-- 1. レガシーブラウザ向け（保険）。Chromeの誤読み込みを防ぐ sizes="any" を付与 -->
  <link rel="icon" href="/favicon.ico" sizes="any">
  <!-- 2. モダンブラウザ向け（主役） -->
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <!-- 3. SVG非対応ブラウザ・Chromeショートカット向け -->
  <link rel="icon" href="/icon-192.png" type="image/png" sizes="192x192">
  <!-- 4. Appleデバイスのホーム画面向け -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#003299">
  
  <!-- OGP (Facebook, X, LINE 等 共通設定) -->
  <meta property="og:locale" content="ja_JP">
  <meta property="og:site_name" content="Tsugawa.TV"> <!-- サイト名をメタデータとして機械に伝える -->
  <meta property="og:type" content="website"> <!-- ブログなどの個別記事は "article" にする -->
  <meta property="og:title" content="タイトル"> <!-- 記事・ブログは "記事のタイトル | サイト名" -->
  <meta property="og:description" content="60～70文字程度"> <!-- ※最重要キーワードを冒頭に -->
  <meta property="og:url" content="https://tsugawa.tv/example/">
  <meta property="og:image" content="https://tsugawa.tv/images/default-ogp.jpg">
  
  <!-- 画像の補足情報（アクセシビリティ＆初回シェア時のバグ防止） -->
  <meta property="og:image:alt" content="画像の説明">
  <meta property="og:image:width" content="1200"> <!-- プロジェクトによってはサイズの省略を検討する -->
  <meta property="og:image:height" content="630"> <!-- プロジェクトによってはサイズの省略を検討する -->
  
  <!-- X / Twitter Cards (OGP で代用できない固有設定のみ記述) -->
  <meta name="twitter:card" content="summary_large_image">
  <!-- アカウントがあれば以下を追加。無ければ不要 -->
  <!-- <meta name="twitter:site" content="@tsugawa_tv"> -->

  <!-- 構造化データ -->
  <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebSite",
      "@id": "{{SITE_URL}}#website",
      "url": "{{SITE_URL}}",
      "name": "{{SITE_NAME}}",
      "inLanguage": "{{SITE_LANGUAGE}}",
      "publisher": {
        "@id": "{{SITE_URL}}#organization"
      }
    },
    {
      "@type": "Organization",
      "@id": "{{SITE_URL}}#organization",
      "url": "{{SITE_URL}}",
      "name": "{{SITE_NAME}}",
      "logo": "{{ORGANIZATION_LOGO_URL}}",
      "description": "{{ORGANIZATION_DESCRIPTION}}",
      "foundingDate": "{{ORGANIZATION_FOUNDING_DATE}}",
      "founder": {
        "@type": "Person",
        "name": "{{FOUNDER_NAME}}",
        "url": "{{FOUNDER_URL}}"
      }
    },
    {
      "@type": "WebPage",
      "@id": "{{PAGE_URL}}#webpage",
      "url": "{{PAGE_URL}}",
      "name": "{{PAGE_TITLE}}",
      "isPartOf": {
        "@id": "{{SITE_URL}}#website"
      }
    }
  ]
}
</script>
</head>
<body class="home">

  <!-- GTM Body (実際のIDに書き換える) -->
  <!-- Google Tag Manager (noscript) -->
  <!-- <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-XXXXXXX" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript> -->
  <!-- End Google Tag Manager (noscript) -->
  
  <nav>
    <div class="logo">Logo</div>
      <div class="links">
        <a href="#">Link 1</a>
        <a href="#">Link 2</a>
        <a href="#">Link 3</a>
      </div>
  </nav>
  
  <main>
    <p>Hello, World!</p>
  </main>
  
  <footer>
    <p>&copy; 2007 &ndash; <span id="year"></span> Tsugawa.TV</p>
  </footer>
  
  <script>
    document.getElementById("year").innerHTML = new Date().getFullYear();
  </script>

</body>
</html>
